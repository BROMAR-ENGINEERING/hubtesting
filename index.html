<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Ultimate Dispatch Scheduler</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT PANEL */
.jobs-panel{
width:280px;
background:white;
border-right:1px solid #ddd;
padding:15px;
overflow-y:auto;
}

.jobs-panel h3{
margin-top:0;
}

.job{
padding:10px;
margin-bottom:10px;
border-radius:6px;
color:white;
cursor:grab;
font-size:14px;
font-weight:bold;
}

/* JOB TYPES */
.job.install{ background:#27ae60; }
.job.maintenance{ background:#16a085; }
.job.testtag{ background:#3498db; }
.job.rcd{ background:#8e44ad; }
.job.emergency{ background:#e74c3c; }

/* CALENDAR */
#calendar{
flex:1;
padding:10px;
}

/* FULLCALENDAR COLORS */
.fc-event.install{
background:#27ae60 !important;
border-color:#27ae60 !important;
}

.fc-event.maintenance{
background:#16a085 !important;
border-color:#16a085 !important;
}

.fc-event.testtag{
background:#3498db !important;
border-color:#3498db !important;
}

.fc-event.rcd{
background:#8e44ad !important;
border-color:#8e44ad !important;
}

.fc-event.emergency{
background:#e74c3c !important;
border-color:#e74c3c !important;
}

</style>

</head>

<body>

<header>
Ultimate Employee Dispatch Scheduler
</header>

<div class="container">

<!-- JOB QUEUE -->
<div class="jobs-panel">
<h3>Unscheduled Jobs</h3>

<div class="job install" data-title="INSTALL" data-type="install">INSTALL</div>
<div class="job maintenance" data-title="MAINTENANCE" data-type="maintenance">MAINTENANCE</div>
<div class="job testtag" data-title="TEST & TAG" data-type="testtag">TEST & TAG</div>
<div class="job rcd" data-title="RCD TESTING" data-type="rcd">RCD TESTING</div>
<div class="job emergency" data-title="EMERGENCY CALL" data-type="emergency">EMERGENCY CALL</div>

</div>

<!-- CALENDAR -->
<div id="calendar"></div>

</div>

<script>

async function loadEmployees(){

const res = await fetch("employees.json")
const data = await res.json()

return data.map(emp => ({
id: emp.id,
title: emp.name
}))

}

document.addEventListener("DOMContentLoaded", async function(){

// make jobs draggable
document.querySelectorAll(".job").forEach(job => {

job.draggable = true

job.addEventListener("dragstart", e => {
e.dataTransfer.setData("title", job.dataset.title)
e.dataTransfer.setData("type", job.dataset.type)
})

})

const employees = await loadEmployees()

const calendarEl = document.getElementById("calendar")

const calendar = new FullCalendar.Calendar(calendarEl, {

schedulerLicenseKey: "CC-Attribution-NonCommercial-NoDerivatives",

initialView: "resourceTimelineWeek",

height: "100%",

resources: employees,

editable: true,
droppable: true,

headerToolbar:{
left:"prev,next today",
center:"title",
right:"resourceTimelineDay,resourceTimelineWeek"
},

slotDuration:"24:00:00",

slotLabelFormat:[
{ weekday:"short" },
{ day:"numeric" }
],

drop:function(info){

const title = info.draggedEl.dataset.title
const type = info.draggedEl.dataset.type

calendar.addEvent({
title: title,
start: info.date,
end: new Date(info.date.getTime() + 2*60*60*1000),
resourceId: info.resource.id,
className: type
})

}

})

calendar.render()

})

</script>

</body>
</html>
