<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Employee Scheduler</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:20px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.jobs-panel{
width:260px;
background:white;
border-right:1px solid #ddd;
padding:15px;
overflow-y:auto;
}

.jobs-panel h3{
margin-top:0;
}

.job{
background:#3498db;
color:white;
padding:10px;
border-radius:5px;
margin-bottom:10px;
cursor:grab;
font-size:14px;
}

.job:hover{
background:#2980b9;
}

#calendar{
flex:1;
padding:15px;
}

</style>

</head>

<body>

<header>
Employee Dispatch Scheduler
</header>

<div class="container">

<div class="jobs-panel">

<h3>Unscheduled Jobs</h3>

<div class="job" data-title="AC Install">AC Install</div>
<div class="job" data-title="Plumbing Repair">Plumbing Repair</div>
<div class="job" data-title="Electrical Check">Electrical Check</div>
<div class="job" data-title="HVAC Service">HVAC Service</div>

</div>

<div id="calendar"></div>

</div>

<script>

async function loadEmployees(){

const response = await fetch("employees.json")
const employees = await response.json()

return employees.map(emp => ({
id: emp.id,
title: emp.name
}))

}

async function initCalendar(){

const employees = await loadEmployees()

const calendarEl = document.getElementById("calendar")

const calendar = new FullCalendar.Calendar(calendarEl, {

schedulerLicenseKey: "CC-Attribution-NonCommercial-NoDerivatives",

initialView: "resourceTimelineWeek",

height: "auto",

resources: employees,

headerToolbar:{
left:"prev,next today",
center:"title",
right:"resourceTimelineDay,resourceTimelineWeek"
},

slotDuration:"24:00:00",

slotLabelFormat:[
{ weekday:"short"},
{ day:"numeric"}
],

droppable:true,

editable:true,

drop:function(info){

const title = info.draggedEl.dataset.title

calendar.addEvent({
title:title,
start:info.date,
end:new Date(info.date.getTime() + 2*60*60*1000),
resourceId:info.resource.id
})

info.draggedEl.remove()

}

})

calendar.render()

}

document.addEventListener("DOMContentLoaded",function(){

document.querySelectorAll(".job").forEach(job => {

job.draggable = true

job.addEventListener("dragstart", function(e){

e.dataTransfer.setData("title", job.dataset.title)

})

})

initCalendar()

})

</script>

</body>
</html>
